# AI Crawler Detection
# Place in the http {} block, before server {} blocks.
#
# Sets $is_ai_crawler to 1 for known AI user-agents.
# Use this variable in your cookie check to bypass for AI bots.
#
# All user-agents verified against official docs — see README.md

map $http_user_agent $is_ai_crawler {
    default 0;

    # Anthropic
    "~*ClaudeBot"              1;
    "~*Claude-SearchBot"       1;
    "~*Claude-User"            1;

    # OpenAI
    "~*GPTBot"                 1;
    "~*OAI-SearchBot"          1;
    "~*ChatGPT-User"           1;

    # Perplexity
    "~*PerplexityBot"          1;
    "~*Perplexity-User"        1;

    # Google
    "~*Google-Extended"        1;
    "~*Google-CloudVertexBot"  1;
    "~*Gemini-Deep-Research"   1;

    # Apple
    "~*Applebot-Extended"      1;

    # Meta
    "~*meta-externalagent"     1;
    "~*meta-externalfetcher"   1;
}
