# Static file endpoints
# Place inside the server {} block.
# These location blocks must be evaluated BEFORE the cookie check.

# robots.txt — served directly, no cookie needed
location = /robots.txt {
    alias /var/www/robots.txt;
    default_type text/plain;
    access_log off;
}

# llms.txt — AI-readable site summary (llmstxt.org standard)
location = /llms.txt {
    alias /var/www/llms.txt;
    default_type text/plain;
    charset utf-8;
    access_log off;
}
